# ═══════════════════════════════════════════════════════════════════════════════
# Default Values for cicd-demo-app
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# Global Configuration
# ═══════════════════════════════════════════════════════════════════════════════
global:
  nameOverride: ""
  fullnameOverride: ""
  imageRegistry: ""
  imagePullSecrets: []

# ═══════════════════════════════════════════════════════════════════════════════
# Application Configuration
# ═══════════════════════════════════════════════════════════════════════════════
replicaCount: 3

image:
  repository: ghcr.io/your-org/cicd-demo-app
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

# ═══════════════════════════════════════════════════════════════════════════════
# Service Account
# ═══════════════════════════════════════════════════════════════════════════════
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""
  name: ""

# ═══════════════════════════════════════════════════════════════════════════════
# Pod Configuration
# ═══════════════════════════════════════════════════════════════════════════════
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ═══════════════════════════════════════════════════════════════════════════════
# Service Configuration
# ═══════════════════════════════════════════════════════════════════════════════
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# ═══════════════════════════════════════════════════════════════════════════════
# Ingress Configuration
# ═══════════════════════════════════════════════════════════════════════════════
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-rps: "10"
  hosts:
    - host: app.cicd-demo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cicd-demo-tls
      hosts:
        - app.cicd-demo.example.com

# ═══════════════════════════════════════════════════════════════════════════════
# Resource Configuration
# ═══════════════════════════════════════════════════════════════════════════════
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ═══════════════════════════════════════════════════════════════════════════════
# Autoscaling Configuration
# ═══════════════════════════════════════════════════════════════════════════════
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60

# ═══════════════════════════════════════════════════════════════════════════════
# Pod Disruption Budget
# ═══════════════════════════════════════════════════════════════════════════════
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  # maxUnavailable: 1

# ═══════════════════════════════════════════════════════════════════════════════
# Node Selector & Affinity
# ═══════════════════════════════════════════════════════════════════════════════
nodeSelector:
  workload-type: general

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - cicd-demo-app
          topologyKey: kubernetes.io/hostname

# ═══════════════════════════════════════════════════════════════════════════════
# Topology Spread Constraints
# ═══════════════════════════════════════════════════════════════════════════════
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: cicd-demo-app

# ═══════════════════════════════════════════════════════════════════════════════
# Probes Configuration
# ═══════════════════════════════════════════════════════════════════════════════
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

# ═══════════════════════════════════════════════════════════════════════════════
# Environment Variables
# ═══════════════════════════════════════════════════════════════════════════════
env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "info"

# ═══════════════════════════════════════════════════════════════════════════════
# Secrets
# ═══════════════════════════════════════════════════════════════════════════════
secrets:
  enabled: true
  data:
    DB_PASSWORD: ""
    API_KEY: ""

# ═══════════════════════════════════════════════════════════════════════════════
# ConfigMap
# ═══════════════════════════════════════════════════════════════════════════════
configMap:
  enabled: true
  data:
    app.properties: |
      # Application configuration
      feature.flags.enabled=true
      cache.ttl=300

# ═══════════════════════════════════════════════════════════════════════════════
# Persistence
# ═══════════════════════════════════════════════════════════════════════════════
persistence:
  enabled: false
  storageClass: "gp3"
  accessMode: ReadWriteOnce
  size: 1Gi

# ═══════════════════════════════════════════════════════════════════════════════
# Network Policy
# ═══════════════════════════════════════════════════════════════════════════════
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

# ═══════════════════════════════════════════════════════════════════════════════
# Service Monitor (Prometheus)
# ═══════════════════════════════════════════════════════════════════════════════
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus

# ═══════════════════════════════════════════════════════════════════════════════
# Pod Monitor
# ═══════════════════════════════════════════════════════════════════════════════
podMonitor:
  enabled: false

# ═══════════════════════════════════════════════════════════════════════════════
# Alerting Rules
# ═══════════════════════════════════════════════════════════════════════════════
prometheusRule:
  enabled: true
  namespace: monitoring
  labels:
    release: prometheus
  rules:
    - alert: CICDDemoAppHighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High error rate detected"
        description: "Error rate is above 10% for more than 5 minutes"

# ═══════════════════════════════════════════════════════════════════════════════
# Dependencies Configuration
# ═══════════════════════════════════════════════════════════════════════════════
postgresql:
  enabled: false
  auth:
    username: cicd-demo
    password: ""
    database: cicd-demo
  primary:
    persistence:
      enabled: true
      size: 10Gi

redis:
  enabled: false
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
