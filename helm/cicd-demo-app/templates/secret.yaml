# ═══════════════════════════════════════════════════════════════════════════════
# Secret Template
# ═══════════════════════════════════════════════════════════════════════════════
{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cicd-demo-app.secretName" . }}
  labels:
    {{- include "cicd-demo-app.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
