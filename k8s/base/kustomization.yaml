# ═══════════════════════════════════════════════════════════════════════════════
# Kustomize Base Configuration
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace for all resources
namespace: cicd-demo

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: cicd-demo
  app.kubernetes.io/managed-by: kustomize

# Resources to include
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - networkpolicy.yaml

# Common annotations
commonAnnotations:
  app.kubernetes.io/created-by: "DevOps Team"
  app.kubernetes.io/part-of: "cicd-pipeline"
