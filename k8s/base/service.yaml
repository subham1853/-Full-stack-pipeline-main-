# ═══════════════════════════════════════════════════════════════════════════════
# Kubernetes Service
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: cicd-demo-service
  labels:
    app.kubernetes.io/name: cicd-demo
    app.kubernetes.io/component: service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cicd-demo
    app.kubernetes.io/component: app
  sessionAffinity: None
